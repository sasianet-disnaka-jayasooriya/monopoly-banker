function calcRent(id, ps) {
  const p = PROPS.find((x) => x.id === id);
  const s = ps[id];
  if (!p || !s || !s.owner || s.isMortgaged) return 0;
  if (p.group === "railroad") { const o = PROPS.filter((x) => x.group === "railroad" && ps[x.id]?.owner === s.owner && !ps[x.id]?.isMortgaged).length; return p.rent[o - 1] || 250; }
  if (p.group === "utility") { const o = PROPS.filter((x) => x.group === "utility" && ps[x.id]?.owner === s.owner && !ps[x.id]?.isMortgaged).length; return o === 2 ? 10 : 4; }
  const h = s.houses || 0;
  if (h > 0) return p.rent[h];
  const gp = PROPS.filter((x) => x.group === p.group);
  const oa = gp.every((x) => ps[x.id]?.owner === s.owner && !ps[x.id]?.isMortgaged);
  return oa ? p.rent[0] * 2 : p.rent[0];
}

function canBuild(id, st) {
  const p = PROPS.find((x) => x.id === id);
  if (!p || !p.bc) return false;
  const s = st.properties[id];
  if (!s?.owner || s.isMortgaged || s.houses >= 5) return false;
  return PROPS.filter((x) => x.group === p.group).every((g) => st.properties[g.id]?.owner === s.owner && !st.properties[g.id]?.isMortgaged);
}

const mkState = () => ({
  screen: "setup", players: [], transactions: [],
  properties: Object.fromEntries(PROPS.map((p) => [p.id, { owner: null, houses: 0, isMortgaged: false }])),
  gameStatus: "setup", freeParkingPot: 0, freeParkingEnabled: false, gameStartedAt: null,
  settings: { startingBalance: STARTING_BALANCE, goSalary: 2000 },
});

function mktxn(from, to, amount, type, note, meta) {
  return { id: "t_" + Date.now() + Math.random(), from, to, amount, type, timestamp: Date.now(), note, meta };
}

function reducer(st, a) {
  const pl = a.payload;
  switch (a.type) {
    case "LOAD_SAVED": return { ...pl };
    case "NEW_GAME": return mkState();
    case "ADD_PLAYER": return { ...st, players: [...st.players, { id: "p_" + Date.now(), name: pl.name, token: pl.token, balance: st.settings.startingBalance, isBankrupt: false }] };
    case "REMOVE_PLAYER": return { ...st, players: st.players.filter((x) => x.id !== pl.id) };
    case "START_GAME": return { ...st, screen: "game", gameStatus: "playing", gameStartedAt: Date.now() };
    case "TOGGLE_FREE_PARKING": return { ...st, freeParkingEnabled: !st.freeParkingEnabled };
    case "COLLECT_FREE_PARKING": { const pot = st.freeParkingPot; if (pot <= 0) return st; return { ...st, players: st.players.map((x) => x.id === pl.playerId ? { ...x, balance: x.balance + pot } : x), freeParkingPot: 0, transactions: [mktxn("freeParking", pl.playerId, pot, "free_parking", "Free Parking jackpot"), ...st.transactions] }; }
    case "TRANSFER": { const { fromId, toId, amount, note } = pl; return { ...st, players: st.players.map((x) => { if (x.id === fromId) return { ...x, balance: x.balance - amount }; if (x.id === toId) return { ...x, balance: x.balance + amount }; return x; }), transactions: [mktxn(fromId, toId, amount, "transfer", note || "Transfer"), ...st.transactions] }; }
    case "PAY_BANK": { const { playerId, amount, note } = pl; const isTax = note && (note.includes("Tax") || note.includes("Jail")); return { ...st, players: st.players.map((x) => x.id === playerId ? { ...x, balance: x.balance - amount } : x), freeParkingPot: st.freeParkingPot + (st.freeParkingEnabled && isTax ? amount : 0), transactions: [mktxn(playerId, "bank", amount, "pay_bank", note || "Paid to Bank"), ...st.transactions] }; }
    case "COLLECT_FROM_BANK": { const { playerId, amount, note } = pl; return { ...st, players: st.players.map((x) => x.id === playerId ? { ...x, balance: x.balance + amount } : x), transactions: [mktxn("bank", playerId, amount, "collect_from_bank", note || "Collected"), ...st.transactions] }; }
    case "BANKRUPT": { const pr = { ...st.properties }; Object.keys(pr).forEach((k) => { if (pr[k].owner === pl.playerId) pr[k] = { owner: null, houses: 0, isMortgaged: false }; }); return { ...st, players: st.players.map((x) => x.id === pl.playerId ? { ...x, isBankrupt: true, balance: 0 } : x), properties: pr, transactions: [mktxn(pl.playerId, "bank", 0, "bankrupt", "Declared bankruptcy"), ...st.transactions] }; }
    case "BUY_PROPERTY": { const pr = PROPS.find((x) => x.id === pl.propId); if (!pr) return st; return { ...st, players: st.players.map((x) => x.id === pl.playerId ? { ...x, balance: x.balance - pr.price } : x), properties: { ...st.properties, [pl.propId]: { ...st.properties[pl.propId], owner: pl.playerId } }, transactions: [mktxn(pl.playerId, "bank", pr.price, "buy_property", "Bought " + pr.name, { propId: pl.propId }), ...st.transactions] }; }
    case "BUILD_HOUSE": { const pr = PROPS.find((x) => x.id === pl.propId); if (!pr || !pr.bc) return st; const h = st.properties[pl.propId]?.houses || 0; if (h >= 5) return st; return { ...st, players: st.players.map((x) => x.id === pl.playerId ? { ...x, balance: x.balance - pr.bc } : x), properties: { ...st.properties, [pl.propId]: { ...st.properties[pl.propId], houses: h + 1 } }, transactions: [mktxn(pl.playerId, "bank", pr.bc, "build_house", "Built on " + pr.name, { propId: pl.propId }), ...st.transactions] }; }
    case "SELL_HOUSE": { const pr = PROPS.find((x) => x.id === pl.propId); if (!pr || !pr.bc) return st; const h = st.properties[pl.propId]?.houses || 0; if (h <= 0) return st; const r = Math.floor(pr.bc / 2); return { ...st, players: st.players.map((x) => x.id === pl.playerId ? { ...x, balance: x.balance + r } : x), properties: { ...st.properties, [pl.propId]: { ...st.properties[pl.propId], houses: h - 1 } }, transactions: [mktxn("bank", pl.playerId, r, "sell_house", "Sold house on " + pr.name, { propId: pl.propId }), ...st.transactions] }; }
    case "MORTGAGE_PROPERTY": { const pr = PROPS.find((x) => x.id === pl.propId); if (!pr) return st; return { ...st, players: st.players.map((x) => x.id === pl.playerId ? { ...x, balance: x.balance + pr.mg } : x), properties: { ...st.properties, [pl.propId]: { ...st.properties[pl.propId], isMortgaged: true, houses: 0 } }, transactions: [mktxn("bank", pl.playerId, pr.mg, "mortgage_property", "Mortgaged " + pr.name, { propId: pl.propId }), ...st.transactions] }; }
    case "UNMORTGAGE_PROPERTY": { const pr = PROPS.find((x) => x.id === pl.propId); if (!pr) return st; const c = Math.floor(pr.mg * 1.1); return { ...st, players: st.players.map((x) => x.id === pl.playerId ? { ...x, balance: x.balance - c } : x), properties: { ...st.properties, [pl.propId]: { ...st.properties[pl.propId], isMortgaged: false } }, transactions: [mktxn(pl.playerId, "bank", c, "unmortgage_property", "Unmortgaged " + pr.name, { propId: pl.propId }), ...st.transactions] }; }
    case "TRADE_PROPERTY": return { ...st, properties: { ...st.properties, [pl.propId]: { ...st.properties[pl.propId], owner: pl.toId, houses: 0 } }, transactions: [mktxn(pl.fromId, pl.toId, 0, "trade_property", "Traded " + (PROPS.find((x) => x.id === pl.propId)?.name || ""), { propId: pl.propId }), ...st.transactions] };
    case "UNDO_LAST": {
      if (!st.transactions.length) return st;
      const l = st.transactions[0];
      let pls = [...st.players], prs = { ...st.properties }, pot = st.freeParkingPot;
      if (l.type === "transfer") { pls = pls.map((x) => { if (x.id === l.from) return { ...x, balance: x.balance + l.amount }; if (x.id === l.to) return { ...x, balance: x.balance - l.amount }; return x; }); }
      else if (l.type === "pay_bank") { pls = pls.map((x) => x.id === l.from ? { ...x, balance: x.balance + l.amount } : x); if (st.freeParkingEnabled && l.note && (l.note.includes("Tax") || l.note.includes("Jail"))) pot = Math.max(0, pot - l.amount); }
      else if (l.type === "collect_from_bank") { pls = pls.map((x) => x.id === l.to ? { ...x, balance: x.balance - l.amount } : x); }
      else if (l.type === "bankrupt") { pls = pls.map((x) => x.id === l.from ? { ...x, isBankrupt: false } : x); }
      else if (l.type === "buy_property" && l.meta?.propId) { pls = pls.map((x) => x.id === l.from ? { ...x, balance: x.balance + l.amount } : x); prs[l.meta.propId] = { owner: null, houses: 0, isMortgaged: false }; }
      else if (l.type === "build_house" && l.meta?.propId) { pls = pls.map((x) => x.id === l.from ? { ...x, balance: x.balance + l.amount } : x); prs[l.meta.propId] = { ...prs[l.meta.propId], houses: (prs[l.meta.propId]?.houses || 1) - 1 }; }
      else if (l.type === "sell_house" && l.meta?.propId) { pls = pls.map((x) => x.id === l.to ? { ...x, balance: x.balance - l.amount } : x); prs[l.meta.propId] = { ...prs[l.meta.propId], houses: (prs[l.meta.propId]?.houses || 0) + 1 }; }
      else if (l.type === "mortgage_property" && l.meta?.propId) { pls = pls.map((x) => x.id === l.to ? { ...x, balance: x.balance - l.amount } : x); prs[l.meta.propId] = { ...prs[l.meta.propId], isMortgaged: false }; }
      else if (l.type === "unmortgage_property" && l.meta?.propId) { pls = pls.map((x) => x.id === l.from ? { ...x, balance: x.balance + l.amount } : x); prs[l.meta.propId] = { ...prs[l.meta.propId], isMortgaged: true }; }
      else if (l.type === "free_parking") { pls = pls.map((x) => x.id === l.to ? { ...x, balance: x.balance - l.amount } : x); pot = l.amount; }
      return { ...st, players: pls, properties: prs, freeParkingPot: pot, transactions: st.transactions.slice(1) };
    }
    default: return st;
  }
}

const Ctx = createContext(null);

function Prov({ children }) {
  const [st, dispatch] = useReducer(reducer, null, mkState);
  const [loading, setL] = useState(true);
  const [hasSave, setHS] = useState(false);

  useEffect(() => {
    const r = storage.get(SAVE_KEY);
    if (r && r.value) { try { const s = JSON.parse(r.value); if (s.gameStatus === "playing") setHS(true); } catch(e) {} }
    setL(false);
  }, []);

  useEffect(() => {
    if (loading) return;
    if (st.gameStatus === "playing") { storage.set(SAVE_KEY, JSON.stringify(st)); }
  }, [st, loading]);

  const resume = useCallback(() => {
    const r = storage.get(SAVE_KEY);
    if (r && r.value) { try { dispatch({ type: "LOAD_SAVED", payload: JSON.parse(r.value) }); setHS(false); } catch(e) {} }
  }, []);

  const clr = useCallback(() => { storage.del(SAVE_KEY); setHS(false); }, []);

  return (
    <Ctx.Provider value={{ st, dispatch, loading, hasSave, resume, clr }}>
      {children}
    </Ctx.Provider>
  );
}

function useG() { const c = useContext(Ctx); if (!c) throw new Error("wrap"); return c; }

function pLabel(pls, id) {
  if (id === "bank") return "\uD83C\uDFE6 Bank";
  if (id === "freeParking") return "\uD83C\uDD7F\uFE0F Free Parking";
  const p = pls.find((x) => x.id === id);
  return p ? p.token.emoji + " " + p.name : "?";
}

function Stats({ onClose }) {
  const { st } = useG();
  const act = st.players.filter((p) => !p.isBankrupt);
  function nw(p) { let t = p.balance; PROPS.forEach((pr) => { const s = st.properties[pr.id]; if (s?.owner === p.id) { t += s.isMortgaged ? 0 : pr.price; t += (s.houses || 0) * (pr.bc || 0); } }); return t; }
  const ranked = [...act].sort((a, b) => nw(b) - nw(a));
  const el = st.gameStartedAt ? Date.now() - st.gameStartedAt : 0;
  const mn = Math.floor(el / 60000);
  const ts = Math.floor(mn / 60) > 0 ? Math.floor(mn / 60) + "h " + (mn % 60) + "m" : mn + "m";
  return (
    <div style={S.ov} onClick={onClose}><div style={S.mdl} onClick={(e) => e.stopPropagation()}>
      <div style={S.mhdr}><h3 style={S.mttl}>{"\uD83D\uDCCA Stats"}</h3><button onClick={onClose} style={S.mcl}>{"\u2715"}</button></div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: "8px", marginBottom: "16px" }}>{[{ l: "Time", v: ts }, { l: "Txns", v: st.transactions.length }, { l: "Properties", v: PROPS.filter((p) => st.properties[p.id]?.owner).length + "/" + PROPS.length }, { l: "Free Parking", v: st.freeParkingEnabled ? fmt(st.freeParkingPot) : "Off" }].map((x, i) => ( <div key={i} style={{ background: "rgba(0,0,0,0.2)", borderRadius: "10px", padding: "10px", textAlign: "center" }}><div style={{ fontSize: "10px", color: "#5a7a5a", fontWeight: "700", textTransform: "uppercase" }}>{x.l}</div><div style={{ fontSize: "18px", fontWeight: "800", color: "#FF9933", marginTop: "4px" }}>{x.v}</div></div> ))}</div>
      <h4 style={{ ...S.cttl, marginBottom: "10px" }}>Wealth Rankings</h4>
      {ranked.map((p, i) => { const n = nw(p); const mx = nw(ranked[0]) || 1; return ( <div key={p.id} style={{ display: "flex", alignItems: "center", gap: "10px", padding: "10px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}><span style={{ fontSize: "16px", fontWeight: "800", color: i === 0 ? "#FF9933" : "#5a7a5a", width: "24px", textAlign: "center" }}>{i === 0 ? "\uD83D\uDC51" : "#" + (i + 1)}</span><span style={{ fontSize: "22px" }}>{p.token.emoji}</span><div style={{ flex: 1 }}><div style={{ fontSize: "14px", fontWeight: "600", color: "#e8f0e8" }}>{p.name}</div><div style={{ height: "4px", borderRadius: "2px", background: "rgba(255,255,255,0.06)", marginTop: "4px" }}><div style={{ height: "100%", borderRadius: "2px", background: i === 0 ? "#FF9933" : "#138808", width: (n / mx * 100) + "%" }} /></div></div><div style={{ textAlign: "right" }}><div style={{ fontSize: "16px", fontWeight: "800", color: "#FF9933" }}>{fmt(n)}</div></div></div> ); })}
    </div></div>
  );
}

function Setup() {
  const { st, dispatch, hasSave, resume, clr } = useG();

function Game() {
  const { st, dispatch, clr } = useG();
  const [md, sMd] = useState(null); const [sp, sSp] = useState(null); const [tp, sTp] = useState(null); const [am, sAm] = useState(""); const [nt, sNt] = useState(""); const [cf, sCf] = useState(null); const [toast, sToast] = useState(null); const [mn, sMn] = useState(false);

  function fl(m, t) { sToast({ message: m, type: t || "success" }); setTimeout(() => sToast(null), 2500); }
  function cl() { sMd(null); sSp(null); sTp(null); sAm(""); sNt(""); sCf(null); }
  function ex() { const a = parseInt(am); if (!a || a <= 0) return; if (md === "transfer") { if (!sp || !tp) return; if (sp.balance < a) { fl("Insufficient!", "error"); return; } dispatch({ type: "TRANSFER", payload: { fromId: sp.id, toId: tp.id, amount: a, note: nt || "Rent/Trade" } }); fl(sp.token.emoji + " \u2192 " + fmt(a) + " \u2192 " + tp.token.emoji); } else if (md === "pay") { if (!sp) return; if (sp.balance < a) { fl("Insufficient!", "error"); return; } dispatch({ type: "PAY_BANK", payload: { playerId: sp.id, amount: a, note: nt || "Bank payment" } }); fl(sp.token.emoji + " paid " + fmt(a)); } else if (md === "collect") { if (!sp) return; dispatch({ type: "COLLECT_FROM_BANK", payload: { playerId: sp.id, amount: a, note: nt || "Collection" } }); fl(sp.token.emoji + " collected " + fmt(a)); } cl(); }
  function qp(cp) { if (!sp) { fl("Select player first", "error"); return; } if (cp.type === "pay") { if (sp.balance < cp.amount) { fl("Insufficient!", "error"); return; } dispatch({ type: "PAY_BANK", payload: { playerId: sp.id, amount: cp.amount, note: cp.note } }); } else { dispatch({ type: "COLLECT_FROM_BANK", payload: { playerId: sp.id, amount: cp.amount, note: cp.note } }); } fl(sp.token.emoji + " " + (cp.type === "pay" ? "paid" : "collected") + " " + fmt(cp.amount)); sSp(null); }
  const go = act.length <= 1 && bk.length > 0;

  return (

      {mn && <div style={{ position: "relative", zIndex: 50 }}><div style={{ position: "absolute", right: 0, top: "-4px", background: "#142e1e", border: "1px solid rgba(255,153,51,0.2)", borderRadius: "12px", padding: "4px", minWidth: "160px", boxShadow: "0 8px 24px rgba(0,0,0,0.5)" }}><button onClick={() => { sCf({ message: "Start new game?", onConfirm: () => { clr(); dispatch({ type: "NEW_GAME" }); sCf(null); } }); sMn(false); }} style={{ ...S.mi, color: "#e85454" }}>{"\uD83D\uDD04 New Game"}</button><button onClick={() => sMn(false)} style={S.mi}>{"\u2715 Close"}</button></div></div>}

      {sp && <div style={S.card}><h3 style={S.cttl}>Quick \u2014 {sp.token.emoji} {sp.name}</h3><div style={S.qg}>{COMMON_PAYMENTS.map((cp, i) => ( <button key={i} onClick={() => qp(cp)} style={{ ...S.qb, ...(cp.type === "collect" ? S.qcl : S.qpy) }}><span style={S.ql}>{cp.label}</span><span style={S.qa}>{(cp.type === "pay" ? "-" : "+") + fmt(cp.amount)}</span></button> ))}{st.freeParkingEnabled && st.freeParkingPot > 0 && <button onClick={() => { dispatch({ type: "COLLECT_FREE_PARKING", payload: { playerId: sp.id } }); fl("Collected " + fmt(st.freeParkingPot) + "!"); sSp(null); }} style={{ ...S.qb, background: "rgba(100,149,237,0.1)", borderColor: "rgba(100,149,237,0.3)", color: "#6495ed" }}><span style={S.ql}>Free Parking</span><span style={S.qa}>+{fmt(st.freeParkingPot)}</span></button>}<button onClick={() => sCf({ message: "Declare " + sp.name + " bankrupt?", onConfirm: () => { dispatch({ type: "BANKRUPT", payload: { playerId: sp.id } }); fl("Bankrupt!", "error"); sCf(null); sSp(null); } })} style={{ ...S.qb, ...S.qbk }}><span style={S.ql}>Bankrupt</span><span style={S.qa}>{"\u2620\uFE0F"}</span></button></div></div>}
      <div style={S.card}><h3 style={S.cttl}>Transactions</h3><div style={S.ag}><button onClick={() => { sMd("transfer"); sSp(null); sTp(null); sAm(""); sNt(""); }} style={{ ...S.ab, ...S.atr }}><span style={S.ai}>{"\u2194"}</span><span style={S.al}>Transfer</span></button><button onClick={() => { sMd("pay"); sSp(null); sAm(""); sNt(""); }} style={{ ...S.ab, ...S.apay }}><span style={S.ai}>{"\u2191"}</span><span style={S.al}>Pay Bank</span></button><button onClick={() => { sMd("collect"); sSp(null); sAm(""); sNt(""); }} style={{ ...S.ab, ...S.acol }}><span style={S.ai}>{"\u2193"}</span><span style={S.al}>Collect</span></button><button onClick={() => { if (st.transactions.length > 0) { dispatch({ type: "UNDO_LAST" }); fl("Undone"); } }} disabled={!st.transactions.length} style={{ ...S.ab, ...S.aund, ...(!st.transactions.length ? { opacity: 0.3 } : {}) }}><span style={S.ai}>{"\u21A9"}</span><span style={S.al}>Undo</span></button></div></div>
      {(md === "transfer" || md === "pay" || md === "collect") && ( <div style={S.ov} onClick={cl}><div style={S.mdl} onClick={(e) => e.stopPropagation()}><div style={S.mhdr}><h3 style={S.mttl}>{md === "transfer" ? "\u2194 Transfer" : md === "pay" ? "\u2191 Pay Bank" : "\u2193 Collect"}</h3><button onClick={cl} style={S.mcl}>{"\u2715"}</button></div><div style={S.msec}><p style={S.mlbl}>{md === "transfer" ? "From:" : md === "pay" ? "Who pays:" : "Who collects:"}</p><div style={S.mpg}>{act.map((p) => ( <button key={p.id} onClick={() => { sSp(p); if (tp?.id === p.id) sTp(null); }} style={{ ...S.mpb, ...(sp?.id === p.id ? S.mpa : {}) }}><span style={{ fontSize: "20px" }}>{p.token.emoji}</span><span style={S.mpn}>{p.name}</span><span style={S.mpp}>{fmt(p.balance)}</span></button> ))}</div></div>{md === "transfer" && sp && <div style={S.msec}><p style={S.mlbl}>To:</p><div style={S.mpg}>{act.filter((p) => p.id !== sp.id).map((p) => ( <button key={p.id} onClick={() => sTp(p)} style={{ ...S.mpb, ...(tp?.id === p.id ? S.mpa : {}) }}><span style={{ fontSize: "20px" }}>{p.token.emoji}</span><span style={S.mpn}>{p.name}</span><span style={S.mpp}>{fmt(p.balance)}</span></button> ))}</div></div>}{sp && (md !== "transfer" || tp) && <div style={S.msec}><p style={S.mlbl}>Amount:</p><input type="number" placeholder={"\u20B90"} value={am} onChange={(e) => sAm(e.target.value)} style={S.ami} autoFocus /><div style={S.qag}>{QUICK_AMOUNTS.map((q) => ( <button key={q} onClick={() => sAm(String(q))} style={{ ...S.qab, ...(am === String(q) ? S.qaA : {}) }}>{fmt(q)}</button> ))}</div><input type="text" placeholder="Note (optional)" value={nt} onChange={(e) => sNt(e.target.value)} style={{ ...S.inp, marginTop: "10px", marginBottom: "0" }} maxLength={40} /></div>}<button onClick={ex} disabled={!am || parseInt(am) <= 0 || !sp || (md === "transfer" && !tp)} style={{ ...S.pri, marginTop: "16px", ...(!am || parseInt(am) <= 0 ? S.priOff : {}) }}>{md === "transfer" ? "Pay " + fmt(am || 0) + " \u2192 " + (tp?.name || "...") : md === "pay" ? "Pay " + fmt(am || 0) : "Collect " + fmt(am || 0)}</button></div></div> )}
      {md === "history" && ( <div style={S.ov} onClick={cl}><div style={S.mdl} onClick={(e) => e.stopPropagation()}><div style={S.mhdr}><h3 style={S.mttl}>{"\uD83D\uDCCB History"}</h3><button onClick={cl} style={S.mcl}>{"\u2715"}</button></div><div style={S.hl}>{!st.transactions.length ? <p style={S.he}>No transactions yet</p> : st.transactions.map((t) => ( <div key={t.id} style={S.hi}><div style={S.ht}><span style={S.hp}>{pLabel(st.players, t.from)} {"\u2192"} {pLabel(st.players, t.to)}</span><span style={S.ha}>{fmt(t.amount)}</span></div><div style={S.hbt}><span style={S.hn}>{t.note}</span><span style={S.htm}>{new Date(t.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</span></div></div> ))}</div></div></div> )}
      {md === "properties" && <PropPanel onClose={cl} flash={fl} />}
      {md === "stats" && <Stats onClose={cl} />}
    </div>
  );
}
